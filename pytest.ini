[pytest]
# Prevent accidental monorepo-wide test collection from the repo root.
# Each subproject must be tested individually via:
#   cd <subdir> && pytest
# or via the per-suite runner:
#   bash scripts/run_portfolio_pytest.sh
#
# norecursedirs prevents pytest from descending into any subdirectory when
# invoked from the repo root.
testpaths =
norecursedirs = *
addopts = --tb=short
