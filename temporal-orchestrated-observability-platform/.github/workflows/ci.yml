name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle build and test
        run: ./gradlew build test --no-daemon

      - name: Validate Docker Compose
        run: docker compose -f deploy/docker-compose.yml config

      - name: Validate OTel Collector config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/deploy/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:0.114.0 \
            validate --config=/etc/otelcol-contrib/config.yaml

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "${{ github.workspace }}/deploy/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.55.1 \
            check rules /etc/prometheus/alerts.yml
