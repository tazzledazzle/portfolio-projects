global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Worker metrics — host.docker.internal when worker runs on host (macOS/Windows Docker Desktop)
  - job_name: ai-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9464"]
    scrape_interval: 15s

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
    scrape_interval: 15s
