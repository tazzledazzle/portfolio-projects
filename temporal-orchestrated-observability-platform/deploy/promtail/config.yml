server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Worker JSON logs (host: ./logs/worker.log → mounted at /var/log/worker/)
  - job_name: worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: worker
          service_name: ai-temporal-worker
          __path__: /var/log/worker/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            trace_id: trace_id
            span_id: span_id
            workflow_id: workflow_id
            run_id: run_id
            workflow_type: workflow_type
            activity_type: activity_type
      - labels:
          level:
          service_name:
