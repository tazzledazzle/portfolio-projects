apiVersion: v1
kind: Namespace
metadata:
  name: devex-eng-i-006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eng-i-006
  namespace: devex-eng-i-006
  labels:
    app: eng-i-006
    requirement: eng-i-006
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eng-i-006
  template:
    metadata:
      labels:
        app: eng-i-006
    spec:
      containers:
        - name: eng-i-006
          image: eng-i-006:local
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: eng-i-006
  namespace: devex-eng-i-006
spec:
  selector:
    app: eng-i-006
  ports:
    - port: 80
      targetPort: 8080
