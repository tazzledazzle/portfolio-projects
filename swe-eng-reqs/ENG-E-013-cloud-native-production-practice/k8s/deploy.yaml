apiVersion: v1
kind: Namespace
metadata:
  name: devex-eng-e-013
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eng-e-013
  namespace: devex-eng-e-013
  labels:
    app: eng-e-013
    requirement: eng-e-013
  annotations:
    devex.central-webbing/hpa-ready: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eng-e-013
  template:
    metadata:
      labels:
        app: eng-e-013
    spec:
      containers:
        - name: eng-e-013
          image: eng-e-013:local
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: eng-e-013
  namespace: devex-eng-e-013
spec:
  selector:
    app: eng-e-013
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eng-e-013
  namespace: devex-eng-e-013
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eng-e-013
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
