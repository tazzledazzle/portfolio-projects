name: api-compat

on:
  pull_request:
  push:
    branches: [main]

jobs:
  detect-breaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run API compatibility check
        run: ./scripts/check-api-compat.sh
