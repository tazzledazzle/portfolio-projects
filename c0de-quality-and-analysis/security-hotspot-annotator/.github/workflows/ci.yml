name: security-hotspot-annotator

on:
  pull_request:
  workflow_dispatch:

jobs:
  annotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run annotator dry run
        run: ./scripts/annotate-pr.sh --dry-run
