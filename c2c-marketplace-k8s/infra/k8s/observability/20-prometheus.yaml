# Prometheus (metrics backend for kind — chosen over Mimir for lower memory).
# Mimir-compatible PromQL API; Grafana datasource uid/name: prometheus
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: c2c
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: alloy
        static_configs:
          - targets: ["alloy:12345"]
        metrics_path: /metrics
      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics:8080"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: c2c
  labels: { app: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=2d
            - --web.enable-lifecycle
            - --web.enable-remote-write-receiver
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          projected:
            sources:
              - configMap:
                  name: prometheus-recording-rules
              - configMap:
                  name: prometheus-burn-alerts
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: c2c
  labels: { app: prometheus }
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: c2c
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: c2c-prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: c2c-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: c2c-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: c2c
