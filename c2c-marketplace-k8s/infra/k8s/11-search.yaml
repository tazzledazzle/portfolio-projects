apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: c2c
spec:
  replicas: 1
  selector:
    matchLabels: { app: search-service }
  template:
    metadata:
      labels: { app: search-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: search-service
          image: c2c/search-service:local
          imagePullPolicy: Never
          env:
            - name: OPENSEARCH_URL
              value: http://opensearch:9200
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: PORT
              value: "8082"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy:4318
            - name: OTEL_SERVICE_NAME
              value: search-service
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet: { path: /healthz, port: 8082 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: c2c
spec:
  type: NodePort
  selector: { app: search-service }
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082
