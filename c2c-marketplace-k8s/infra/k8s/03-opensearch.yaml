apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: c2c
spec:
  replicas: 1
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.14.0
          env:
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            requests:
              memory: "768Mi"
            limits:
              memory: "1Gi"
          ports:
            - containerPort: 9200
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: c2c
spec:
  selector: { app: opensearch }
  ports:
    - port: 9200
      targetPort: 9200
