apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: c2c
spec:
  replicas: 1
  selector:
    matchLabels: { app: redpanda }
  template:
    metadata:
      labels: { app: redpanda }
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.1.9
          args:
            - redpanda
            - start
            - --smp=1
            - --memory=512M
            - --overprovisioned
            - --node-id=0
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            # Advertise the in-cluster DNS name, not localhost -- this is
            # the address every other pod will use to reach it, and the
            # single most common way to break Kafka-in-k8s if you get it
            # wrong (advertising an address only reachable from inside the
            # broker's own pod).
            - --advertise-kafka-addr=PLAINTEXT://redpanda.c2c.svc.cluster.local:9092
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: c2c
spec:
  selector: { app: redpanda }
  ports:
    - port: 9092
      targetPort: 9092
