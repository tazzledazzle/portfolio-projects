kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: c2c-marketplace
nodes:
  - role: control-plane
    extraPortMappings:
      # Expose the services on host ports without needing kubectl
      # port-forward for basic smoke testing.
      # 30081 fronts Gloo (or Istio) gateway-proxy for listings canaries —
      # not the listings-service NodePort directly.
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
      - containerPort: 30082
        hostPort: 8082
        protocol: TCP
      - containerPort: 30083
        hostPort: 8083
        protocol: TCP
      - containerPort: 30084
        hostPort: 8084
        protocol: TCP
      # Grafana (anonymous Viewer) — NodePort 30300
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
