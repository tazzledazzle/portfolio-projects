apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: c2c
spec:
  replicas: 1
  selector:
    matchLabels: { app: payments-service }
  template:
    metadata:
      labels: { app: payments-service }
    spec:
      containers:
        - name: payments-service
          image: c2c/payments-service:local
          imagePullPolicy: Never
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/marketplace
            - name: DB_USER
              value: marketplace
            - name: DB_PASSWORD
              value: marketplace
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: PORT
              value: "8084"
          ports:
            - containerPort: 8084
          readinessProbe:
            httpGet: { path: /healthz, port: 8084 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: c2c
spec:
  type: NodePort
  selector: { app: payments-service }
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
