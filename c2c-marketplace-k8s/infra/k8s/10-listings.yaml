apiVersion: apps/v1
kind: Deployment
metadata:
  name: listings-service
  namespace: c2c
spec:
  replicas: 1
  selector:
    matchLabels: { app: listings-service }
  template:
    metadata:
      labels: { app: listings-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: listings-service
          image: c2c/listings-service:local
          imagePullPolicy: Never # image is loaded via `kind load docker-image`, not pulled from a registry
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/marketplace
            - name: DB_USER
              value: marketplace
            - name: DB_PASSWORD
              value: marketplace
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: PORT
              value: "8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy:4318
            - name: OTEL_SERVICE_NAME
              value: listings-service
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
# Service is managed by Flagger (Canary generates apex / primary / canary ClusterIP).
# External access: kind NodePort 30081 → Gloo gateway-proxy → VirtualService → RouteTable.
