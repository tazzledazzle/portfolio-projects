apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: c2c
spec:
  # 2 replicas on purpose: this is the one service where "which pod holds
  # this user's socket" actually matters. With replicas=1 the Redis
  # presence/pub-sub machinery in ConnectionRegistry never has anything to
  # do -- bump this to see it exercised, per TDD.md's suggested next
  # experiment.
  replicas: 2
  selector:
    matchLabels: { app: messaging-service }
  template:
    metadata:
      labels: { app: messaging-service }
    spec:
      containers:
        - name: messaging-service
          image: c2c/messaging-service:local
          imagePullPolicy: Never
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/marketplace
            - name: DB_USER
              value: marketplace
            - name: DB_PASSWORD
              value: marketplace
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PORT
              value: "8083"
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet: { path: /healthz, port: 8083 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: c2c
spec:
  type: NodePort
  selector: { app: messaging-service }
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083
