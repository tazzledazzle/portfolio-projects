# Istio ingress gateway Helm values for kind fallback.
# Maps host localhost:8081 (kind NodePort 30081) to the Istio gateway.
#
#   helm upgrade -i istio-ingress istio/gateway -n istio-system -f values-istio-gateway.yaml

service:
  type: NodePort
  ports:
    - name: http2
      port: 80
      targetPort: 80
      nodePort: 30081
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
      protocol: TCP

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
