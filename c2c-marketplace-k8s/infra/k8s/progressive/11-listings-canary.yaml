# Flagger Canary for listings-service (Gloo provider).
# Requires: Gloo + Flagger installed, MetricTemplates, loadtester, VirtualService.
#
# Flagger will generate:
#   deployment/listings-service-primary
#   service/listings-service, listings-service-primary, listings-service-canary
#   routetable/listings-service
#   upstreams for primary + canary
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: listings-service
  namespace: c2c
spec:
  provider: gloo
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: listings-service
  progressDeadlineSeconds: 120
  service:
    port: 8081
    targetPort: 8081
    portName: http
  analysis:
    interval: 30s
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      - name: listings-success-rate
        templateRef:
          name: listings-success-rate
          namespace: c2c
        thresholdRange:
          min: 99
        interval: 30s
      - name: listings-latency-p99
        templateRef:
          name: listings-latency-p99
          namespace: c2c
        thresholdRange:
          max: 500
        interval: 30s
    webhooks:
      - name: load-test
        type: rollout
        url: http://flagger-loadtester.c2c/
        timeout: 15s
        metadata:
          type: cmd
          cmd: >-
            hey -z 20s -q 5 -c 2
            -host listings.local
            http://gateway-proxy.gloo-system/healthz
      - name: acceptance-test
        type: pre-rollout
        url: http://flagger-loadtester.c2c/
        timeout: 30s
        metadata:
          type: bash
          cmd: >-
            curl -sf -H 'Host: listings.local'
            http://gateway-proxy.gloo-system/healthz
            | grep -qi ok
            || curl -sf -o /dev/null -w '%{http_code}'
            -H 'Host: listings.local'
            http://gateway-proxy.gloo-system/healthz
            | grep -E '200|204'
