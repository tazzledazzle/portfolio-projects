version: "3.8"

# Fast inner loop: `docker compose up -d` for infra, then run each service
# with `./gradlew :listings-service:run` etc. from the repo root (or use
# the `services` section below to run everything containerized).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    # Kafka-API-compatible, single binary, far lighter than running real
    # Kafka + Zookeeper for a local dev loop.
    image: redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      # Advertise localhost so host-side `./gradlew :*:run` producers can
      # resolve the broker after metadata refresh. Container DNS name
      # `redpanda` is unreachable from the host network.
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  # Optional LGTM stack for local Gradle runs:
  #   docker compose --profile observability up -d
  # Default `docker compose up -d` stays infra-only (unchanged).
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=2d
    ports:
      - "9090:9090"
    volumes:
      - ./compose-observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./compose-observability/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./compose-observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on: [prometheus, loki, tempo]

  alloy:
    profiles: ["observability"]
    image: grafana/alloy:v1.3.1
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./compose-observability/alloy.config.alloy:/etc/alloy/config.alloy:ro
    depends_on: [prometheus, loki, tempo]

  # Optional: run the services themselves in compose too, instead of via
  # `./gradlew run`. Uncomment once you've built the images with
  # scripts/build-images.sh.
  #
  # listings-service:
  #   image: c2c/listings-service:local
  #   environment:
  #     DB_URL: jdbc:postgresql://postgres:5432/marketplace
  #     KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  #   ports:
  #     - "8081:8081"
  #   depends_on: [postgres, redpanda]
