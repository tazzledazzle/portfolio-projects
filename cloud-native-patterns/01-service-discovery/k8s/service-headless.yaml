apiVersion: v1
kind: Service
metadata:
  name: kafka-broker
  namespace: kafka
  labels:
    app: kafka-broker
spec:
  # clusterIP: None makes this a "headless" service.
  # Headless services return individual pod IPs from DNS (A records per pod)
  # rather than a single virtual ClusterIP. This is the correct pattern for
  # StatefulSets where clients need to address specific pod identities
  # (e.g., Kafka broker 0, 1, 2 — not a random broker behind a VIP).
  clusterIP: None
  selector:
    app: kafka-broker
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: kafka-internal
      port: 9093
      targetPort: 9093
      protocol: TCP
    - name: jmx
      port: 9999
      targetPort: 9999
      protocol: TCP
  publishNotReadyAddresses: false  # Only include ready pods in DNS responses.
---
# DNS resolution with headless service for StatefulSet pods:
# kafka-broker-0.kafka-broker.kafka.svc.cluster.local → pod IP of broker 0
# kafka-broker-1.kafka-broker.kafka.svc.cluster.local → pod IP of broker 1
# kafka-broker-2.kafka-broker.kafka.svc.cluster.local → pod IP of broker 2
#
# Pattern for bootstrap servers in client config:
#   bootstrap.servers=kafka-broker-0.kafka-broker.kafka.svc.cluster.local:9092,
#                     kafka-broker-1.kafka-broker.kafka.svc.cluster.local:9092,
#                     kafka-broker-2.kafka-broker.kafka.svc.cluster.local:9092
